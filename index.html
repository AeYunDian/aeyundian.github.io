<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Yund</title>
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <style>
        .dialog-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;z-index:9999;}.dialog-content{background:white;padding:30px;border-radius:10px;max-width:500px;width:90%;text-align:center;box-shadow:0 5px 15px rgba(0,0,0,0.3);}.dialog-title{color:#e74c3c;font-size:24px;margin-bottom:15px;}.dialog-message{color:#333;font-size:16px;line-height:1.5;margin-bottom:25px;}.dialog-button{background:#3498db;color:white;border:none;padding:10px 25px;border-radius:5px;font-size:16px;cursor:pointer;transition:background 0.3s;}.dialog-button:hover{background:#2980b9;}.redirect-notice{margin-top:15px;font-size:14px;color:#666;}*{margin:0;padding:0;box-sizing:border-box;}body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:radial-gradient(ellipse at center,#000,#1a0022);overflow:hidden;font-family:Arial,sans-serif;color:#fff;}.background-container{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;display:flex;justify-content:center;align-items:center;}canvas{position:absolute;top:0;left:0;width:100%;height:100%;}.black-hole-container{position:relative;width:100%;height:100%;display:flex;justify-content:center;align-items:center;}.black-hole{position:absolute;width:200px;height:200px;background:#000;border-radius:50%;border:10px solid transparent;box-shadow:0 0 20px 5px rgba(255,105,180,.8),0 0 40px 10px rgba(128,0,128,.7),0 0 60px 15px rgba(0,0,255,.6);animation:a 3s infinite ease-in-out;}.purple-shadow{position:absolute;width:450px;height:450px;background:radial-gradient(circle,rgba(128,0,128,.2),transparent 70%);border-radius:50%;animation:b 5s infinite ease-in-out;}.stars{position:absolute;width:100%;height:100%;top:0;left:0;}.star{position:absolute;width:4px;height:4px;background:purple;border-radius:50%;animation:c 3s infinite ease-in-out;}@keyframes a{0%,100%{box-shadow:0 0 20px 5px rgba(255,105,180,.8),0 0 40px 10px rgba(128,0,128,.7),0 0 60px 15px rgba(0,0,255,.6);}50%{box-shadow:0 0 30px 10px rgba(255,105,180,.9),0 0 50px 15px rgba(128,0,128,.8),0 0 70px 20px rgba(0,0,255,.7);}}@keyframes b{0%{transform:scale(1);background:radial-gradient(circle,rgba(59,3,59,.2),transparent 70%);}25%{transform:scale(1.1);background:radial-gradient(circle,rgba(170,0,170,.4),transparent 70%);}50%{transform:scale(1.2);background:radial-gradient(circle,rgba(200,0,200,.6),transparent 70%);}75%{transform:scale(1.1);background:radial-gradient(circle,rgba(170,0,170,.4),transparent 70%);}100%{transform:scale(1);background:radial-gradient(circle,rgba(128,0,128,.2),transparent 70%);}}@keyframes c{0%,100%{opacity:1;}50%{opacity:.2;}}.main-content{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80%;max-width:800px;z-index:3;opacity:0;transition:opacity .5s ease;}.glass-window{background:rgba(30,30,40,.7);backdrop-filter:blur(10px);border-radius:15px;border:1px solid rgba(255,255,255,.2);box-shadow:0 8px 32px rgba(0,0,0,.3);overflow:hidden;}.window-header{padding:15px 20px;background:rgba(0,0,0,.3);display:flex;align-items:center;border-bottom:1px solid rgba(255,255,255,.1);user-select:none;cursor:move;}.window-icon{width:24px;height:24px;margin-right:10px;border-radius:4px;}.window-title{font-weight:700;color:#f0f0f0;}.window-content{padding:20px;}.profile-section{display:flex;align-items:center;margin-bottom:20px;}.profile-image{width:80px;height:80px;border-radius:50%;margin-right:20px;border:2px solid rgba(255,105,180,.5);box-shadow:0 0 15px rgba(255,105,180,.5);}.profile-text{font-size:24px;font-weight:700;color:#fff;text-shadow:0 0 10px rgba(255,105,180,.8);}.button-container{display:flex;gap:15px;margin-bottom:30px;flex-wrap:wrap;}.btn{padding:12px 25px;border-radius:8px;border:none;font-weight:700;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 15px rgba(0,0,0,.2);}.btn-pink{background:linear-gradient(45deg,#ff4d8d,#ff0066);color:#fff;}.btn-black{background:linear-gradient(45deg,#333,#000);color:#fff;}.btn:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.3);}.btn-pink:hover{background:linear-gradient(45deg,#ff0066,#cc0052);}.btn-black:hover{background:linear-gradient(45deg,#000,#222);}.software-section{margin-top:20px;}.section-title{font-size:18px;margin-bottom:15px;color:#f0f0f0;border-bottom:1px solid rgba(255,255,255,.1);padding-bottom:8px;}.software-item{display:flex;justify-content:space-between;align-items:center;padding:12px 15px;background:rgba(0,0,0,.2);border-radius:8px;margin-bottom:10px;transition:all .3s ease;}.software-item:hover{background:rgba(0,0,0,.3);transform:translateX(5px);}.software-info{display:flex;align-items:center;}.software-name{font-weight:700;margin-right:10px;}.tag{padding:3px 8px;border-radius:4px;font-size:12px;margin-right:8px;}.tag:last-child{margin-right:0;}.tag-disabled{background:rgba(255,0,0,.2);color:red;}.tag-active{background:rgba(0,200,0,.2);color:#0f0;}.software-btn{padding:6px 12px;border-radius:5px;border:none;font-size:12px;cursor:pointer;transition:all .3s ease;}.btn-disabled{background:#555;color:#999;cursor:not-allowed;}.btn-active{background:rgba(255,105,180,.3);color:#fff;}.btn-active:hover{background:rgba(255,105,180,.5);}.loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;justify-content:center;align-items:center;z-index:9999;transition:opacity 1s ease;}@media(max-width:768px){.main-content{width:95%;}.profile-section{flex-direction:column;text-align:center;}.profile-image{margin-right:0;margin-bottom:15px;}.button-container{justify-content:center;}.software-item{flex-direction:column;align-items:flex-start;}.software-btn{margin-top:10px;align-self:flex-end;}}

<body>
    <div class="background-container">
        <div class="stars"></div>
        <canvas id="blackHoleCanvas"></canvas>
        <div class="black-hole-container">
            <div class="purple-shadow"></div>
            <div class="black-hole"></div>
        </div>
    </div>
    <div class="loading" id="loading"></div>
    <div class="main-content" id="mainContent">
        <div class="glass-window" id="glassWindow">
            <div class="window-header" id="windowHeader">
                <img src="./favicon.ico" class="window-icon">
                <div class="window-title">Dashboard - Yund</div>
            </div>
            <div class="window-content">
                <div class="profile-section">
                    <img src="favicon.ico" class="profile-image">
                    <div class="profile-text">Yund (Indie Developer).</div>
                </div>
                <div class="button-container">
                    <button class="btn btn-pink" onclick="window.open('https://space.bilibili.com/3494370328185235','_self')">Bilibili</button>
                    <button class="btn btn-black" onclick="window.open('https://github.com/AeYunDian','_self')">Github</button>
                </div>
                <div class="software-section">
                    <div class="section-title">软件</div>
                    <div class="software-item">
                        <div class="software-info">
                            <div class="software-name">Qr Code Manager</div>
                            <div class="tag tag-active">实用</div>
                            <div class="tag tag-disabled">开源，但已停止所有支持</div>
                        </div>
                        <button class="software-btn btn-disabled">无可用库</button>
                    </div>
                    <div class="software-item">
                        <div class="software-info">
                            <div class="software-name">Cloud mail</div>
                            <div class="tag tag-active">实用</div>
                            <div class="tag tag-active">开源</div>
                            <div class="tag tag-active">在线服务</div>
                        </div>
                        <button class="software-btn btn-active" onclick="window.open('https://mail.io.hb.cn','_self')">转到邮箱页面</button>
                    </div>
                </div>
                <div class="software-section">
                    <div class="section-title">服务</div>
                    <div class="software-item">
                        <div class="software-info">
                            <div class="software-name">Email Verification Code Service</div>
                            <div class="tag tag-active">开源</div>
                            <div class="tag tag-active">在线</div>
                        </div>
                        <button class="software-btn btn-active" onclick="window.open('https://www.io.hb.cn/mail_veri_srvc','_self')">申请服务</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="redirectDialog" class="dialog-overlay">
        <div class="dialog-content">
            <h2 class="dialog-title">重要提示</h2>
            <p class="dialog-message" id="dialogMessage">
                您正在使用旧链接访问，该链接即将失效。<br>
                请使用新域名 <strong>www.io.hb.cn</strong> 访问网站。
            </p>
            <button class="dialog-button" onclick="closeDialog()">我知道了</button>
            <div class="redirect-notice" id="redirectNotice"></div>
        </div>
    </div>
