name: Friend Link Generate

on:
  issues:
    types: [opened, edited]

jobs:
  add-friend:
    if: contains(github.event.issue.title, '友链申请')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Process friend request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            const body = context.payload.issue.body;

            const colorPalette = [
              'rgba(253, 230, 138, 0.15)',
              'rgba(255, 255, 255, 0.15)',
              'rgba(13, 141, 242, 0.15)',
              'rgba(255, 209, 220, 0.15)',
              'rgba(174, 198, 207, 0.15)',
              'rgba(119, 221, 119, 0.15)',
              'rgba(253, 253, 150, 0.15)',
              'rgba(179, 158, 181, 0.15)',
              'rgba(255, 179, 71, 0.15)',
              'rgba(255, 105, 97, 0.15)',
              'rgba(244, 154, 194, 0.15)',
              'rgba(207, 207, 196, 0.15)',
              'rgba(152, 255, 152, 0.15)',
              'rgba(230, 230, 250, 0.15)',
              'rgba(137, 207, 240, 0.15)',
              'rgba(255, 229, 180, 0.15)',
              'rgba(248, 131, 121, 0.15)',
              'rgba(200, 162, 200, 0.15)',
              'rgba(204, 204, 255, 0.15)',
              'rgba(224, 176, 255, 0.15)',
              'rgba(255, 253, 208, 0.15)',
              'rgba(245, 245, 220, 0.15)',
              'rgba(251, 206, 177, 0.15)',
              'rgba(135, 206, 235, 0.15)',
              'rgba(172, 225, 175, 0.15)',
              'rgba(208, 240, 192, 0.15)',
              'rgba(175, 238, 238, 0.15)',
              'rgba(176, 224, 230, 0.15)',
              'rgba(216, 191, 216, 0.15)',
              'rgba(255, 228, 225, 0.15)',
              'rgba(255, 250, 205, 0.15)',
              'rgba(240, 255, 240, 0.15)',
              'rgba(224, 255, 255, 0.15)',
              'rgba(255, 193, 204, 0.15)',
              'rgba(255, 188, 217, 0.15)',
              'rgba(247, 202, 201, 0.15)',
              'rgba(146, 168, 209, 0.15)',
              'rgba(237, 205, 194, 0.15)',
              'rgba(149, 222, 227, 0.15)',
              'rgba(239, 222, 205, 0.15)',
              'rgba(244, 194, 194, 0.15)',
              'rgba(188, 212, 230, 0.15)',
              'rgba(250, 240, 190, 0.15)',
              'rgba(231, 254, 255, 0.15)',
              'rgba(239, 187, 204, 0.15)',
              'rgba(247, 231, 206, 0.15)',
              'rgba(196, 216, 226, 0.15)',
              'rgba(255, 248, 231, 0.15)',
              'rgba(239, 223, 187, 0.15)',
              'rgba(240, 234, 214, 0.15)',
              'rgba(247, 233, 142, 0.15)'
            ];
            function getRandomBackground() {
              return colorPalette[Math.floor(Math.random() * colorPalette.length)];
            }
            function normalizeUrl(url) {
              return url.replace(/\/$/, '');
            }
            function extractLinkFromCard(cardBlock) {
              const match = cardBlock.match(/link:\s*(.+)/);
              return match ? normalizeUrl(match[1].trim()) : null;
            }
            function findInsertPosition(content) {
              // 优先使用明确的结束标记
              const endMarker = '<!-- FRIEND_CARDS_END -->';
              const endIndex = content.indexOf(endMarker);
              if (endIndex !== -1) {
                // 在结束标记之前插入
                return endIndex;
              }

              // 后备方案：查找最后一个 VPCard 块之后
              const vpCardRegex = /```component\s+VPCard[\s\S]*?```/g;
              let lastMatch = null;
              let match;
              while ((match = vpCardRegex.exec(content)) !== null) {
                lastMatch = match;
              }
              if (lastMatch) {
                return lastMatch.index + lastMatch[0].length;
              }
            
              // 最终回退：<!-- more --> 之后
              const moreIndex = content.indexOf('<!-- more -->');
              if (moreIndex !== -1) {
                return moreIndex + '<!-- more -->'.length;
              }
            
              // 实在不行，追加到文件末尾
              return content.length;
            }
            function extract(key) {
              const pattern = new RegExp('### ' + key + '\\s*\\n\\s*(.*?)(?=\\n###|$)', 's');
              const m = body.match(pattern);
              if (m) {
                let val = m[1].trim();
                if (val === 'No response') return '';
                return val.replace(/^`|`$/g, '').trim();
              }
             return '';
            }

            const name = extract('网站名称');
            const desc = extract('网站描述');
            const url = extract('网站链接').replace(/^`|`$/g, '').trim();
            const avatar = extract('网站头像URL').replace(/^`|`$/g, '').trim();

            if (!url) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '## ❌ 友链申请失败\n\n请确保已填写**网站链接**，然后编辑此 Issue 重新触发。'
              });
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: ['需处理']
              });
              return;
            }

            const mdFilePath = 'src/friends/README.md';
            let mdContent;
            try {
              mdContent = fs.readFileSync(mdFilePath, 'utf-8');
            } catch (err) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## ❌ 读取友链文件失败\n\n无法读取 \`${mdFilePath}\`，请检查文件是否存在。`
              });
              return;
            }
            const vpCardRegex = /```component\s+VPCard[\s\S]*?```/g;
            let match;
            const existingUrls = [];
            while ((match = vpCardRegex.exec(mdContent)) !== null) {
              const link = extractLinkFromCard(match[0]);
              if (link) existingUrls.push(link);
            }
            const newUrlNormalized = normalizeUrl(url);
            if (existingUrls.includes(newUrlNormalized)) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## ℹ️ 友链已存在\n\n该链接已在友链列表中，无需重复添加。`
              });
              await github.rest.issues.update({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'closed'
              });
              return;
            }
            if (url && !/^https?:\/\//.test(url) || url.length > 200 || /\s/.test(url)) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '## ❌ 网站链接格式错误\n\n请确保**网站链接**以 `http://` 或 `https://` 开头，且不包含空格，长度不超过 200 字符。编辑此 Issue 重新触发。'
              });
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: ['需处理']
              });
              return;
            }
            if (avatar && (avatar.length > 280 || !/^https?:\/\//.test(avatar) || /\s/.test(avatar) ) ) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '## ❌ 网站头像 URL 格式错误\n\n请确保**网站头像 URL**以 `http://` 或 `https://` 开头，且不包含空格，长度不超过 280 字符。编辑此 Issue 重新触发。'
              });
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: ['需处理']
              });
              return;
            }
            if (name.length > 50 || /\s/.test(name)) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '## ❌ 名称过长\n\n请确保**网站名称**长度不超过 50 字符，且不包含空格。编辑此 Issue 重新触发。'
              });
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: ['需处理']
              });
              return;
            }
            if (desc.length > 200) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '## ❌ 描述过长\n\n请确保**网站描述**长度不超过 200 字符。编辑此 Issue 重新触发。'
              });
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: ['需处理']
              });
              return;
            }
            const randomBg = getRandomBackground();
            const newCard = `\n\`\`\`component VPCard
            title: ${name || '未命名'}
            desc: ${desc || '暂无描述'}
            logo: ${avatar || 'https://undz.cn/default-avatar.svg'}
            link: ${url}
            background: ${randomBg}
            \`\`\`\n`;
            const insertPos = findInsertPosition(mdContent);
            const newMdContent = mdContent.slice(0, insertPos) + newCard + mdContent.slice(insertPos);
            fs.writeFileSync(mdFilePath, newMdContent, 'utf-8');

            execSync('git config user.name "github-actions[bot]"');
            execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');
            execSync('git add src/friends/README.md');
            execSync('git commit -m "feat: 添加友链 "');
            execSync('git push');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ✅ 友链申请已通过！\n\n感谢申请！友链已成功添加到列表中。\n\n📋 **友链信息**\n- 名称：${name}\n- 链接：${url}\n\n⚡ GitHub Actions 将自动重新部署，几分钟内更新生效。\n\n感谢支持！🎉`
            });
            await github.rest.issues.update({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed'
            });
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-docs.yml',
              ref: 'main'
            });